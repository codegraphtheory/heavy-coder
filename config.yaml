model:
  provider: xai-oauth
  default: grok-4.3
agent:
  max_turns: 120
  tool_use_enforcement: true
toolsets:
  - file
  - terminal
  - skills
  - web
  - delegation
  - session_search
  - todo
terminal:
  backend: local
  cwd: "."
security:
  redact_secrets: true
approvals:
  mode: manual
delegation:
  max_concurrent_children: 5
  max_spawn_depth: 1
heavy_coder:
  status: scaffolded
  candidate_widths: [1, 3, 5]
  default_repair_attempts: 2
  trigger_label: hermes:auto
  provider: xai-oauth
  state_labels:
    queued: hermes:queued
    running: hermes:running
    pr_open: hermes:pr-open
    repairing: hermes:repairing
    blocked: hermes:blocked
    merged: hermes:merged
  model_roles:
    candidate: composer-2.5
    coordinator: grok-4.3
    critic: grok-4.3
    synthesizer: grok-4.3
    verifier: grok-4.3
