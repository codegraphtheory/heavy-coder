model:
  provider: xai-oauth
  default: composer-2.5
agent:
  max_turns: 120
  tool_use_enforcement: true
toolsets:
  - file
  - terminal
  - skills
  - web
  - delegation
  - session_search
  - todo
terminal:
  backend: local
  cwd: "."
security:
  redact_secrets: true
approvals:
  mode: manual
delegation:
  max_concurrent_children: 5
  max_spawn_depth: 1
heavy_coder:
  status: ready
  candidate_widths: [3, 5]
  default_width: 3
  team_enforced: true
  single_mode_requires_explicit: true
  default_repair_attempts: 2
  trigger_label: hermes:auto
  provider: xai-oauth
  state_labels:
    queued: hermes:queued
    running: hermes:running
    pr_open: hermes:pr-open
    repairing: hermes:repairing
    blocked: hermes:blocked
    merged: hermes:merged
  model_roles:
    candidate: composer-2.5
    coordinator: composer-2.5
    critic: composer-2.5
    synthesizer: composer-2.5
    verifier: composer-2.5
