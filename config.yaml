model:
  provider: xai-oauth
  default: composer-2.5
agent:
  max_turns: 120
  tool_use_enforcement: true
toolsets:
  - file
  - terminal
  - skills
  - web
  - delegation
  - session_search
  - todo
terminal:
  backend: local
  cwd: "."
security:
  redact_secrets: true
approvals:
  mode: manual
compression:
  enabled: true
  threshold: 0.85
delegation:
  max_concurrent_children: 16
  max_async_children: 16
  max_spawn_depth: 1
  subagent_auto_approve: true
display:
  interface: tui
  tool_progress: verbose
  timestamps: true
  tui_agents_nudge: true
  cli_refresh_interval: 1.0
  bell_on_complete: true
plugins:
  enabled:
    - heavy-council
skills:
  creation_nudge_interval: 0
# Shell hooks (Plan 1A): require profile installed as ~/.hermes/profiles/heavy-coder
# or run: python scripts/sync_profile_hooks.py --profile <name>
hooks_auto_accept: true
hooks:
  on_session_start:
    - command: "~/.hermes/profiles/heavy-coder/agent-hooks/on_session_start_bootstrap.py"
      timeout: 60
  pre_llm_call:
    - command: "~/.hermes/profiles/heavy-coder/agent-hooks/pre_llm_heavy_team.py"
      timeout: 120
  pre_tool_call:
    - matcher: "delegate_task"
      command: "~/.hermes/profiles/heavy-coder/agent-hooks/pre_tool_heavy_team.py"
      timeout: 30
    - matcher: "patch|write_file|terminal|skill_manage|execute_code"
      command: "~/.hermes/profiles/heavy-coder/agent-hooks/pre_tool_heavy_team.py"
      timeout: 30
  post_tool_call:
    - matcher: "delegate_task"
      command: "~/.hermes/profiles/heavy-coder/agent-hooks/post_delegate_task.py"
      timeout: 30
  subagent_stop:
    - command: "~/.hermes/profiles/heavy-coder/agent-hooks/subagent_stop_evidence.py"
      timeout: 30
heavy_coder:
  status: scaffolded
  min_delegate_tasks: 8
  heavy_council_always: true
  candidate_widths: [3, 5, 8, 16]
  council_width: 8
  default_width: 8
  slim_delegate_context: true
  max_injected_plan_chars: 4500
  compact_chat_injection: true
  inline_plan_build: true
  leaf_toolsets: [terminal, file]
  team_enforced: true
  single_mode_requires_explicit: true
  default_repair_attempts: 2
  trigger_label: hermes:auto
  provider: xai-oauth
  state_labels:
    queued: hermes:queued
    running: hermes:running
    pr_open: hermes:pr-open
    repairing: hermes:repairing
    blocked: hermes:blocked
    merged: hermes:merged
  model_roles:
    candidate: composer-2.5
    coordinator: composer-2.5
    critic: composer-2.5
    synthesizer: composer-2.5
    verifier: composer-2.5
  shell_hooks_profile: heavy-coder