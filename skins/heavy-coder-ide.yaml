# Heavy Coder profile skin - cyberpunk ops terminal x Hermes swarm council.
# Grok electric cyan/magenta, Hermes gold telemetry, deep void chrome.
# Installed to ~/.hermes/profiles/<profile>/skins/ via profile distribution.
name: heavy-coder-ide
description: "Heavy Coder - Cursor/VS Code IDE terminal (ASCII prompt, no composer bleed)"

colors:
  banner_border: "#D946EF"
  banner_title: "#00F5FF"
  banner_accent: "#FFE566"
  # Muted/secondary (TUI maps banner_dim -> color.muted for status bar, tools, help hints).
  # Keep luminance high enough for Ink dimColor on dark terminals.
  banner_dim: "#D8B4FE"
  banner_text: "#E0F7FA"
  ui_accent: "#00E5FF"
  ui_label: "#F5D0FE"
  ui_primary: "#67E8F9"
  ui_border: "#C026D3"
  ui_text: "#F0FDFF"
  ui_ok: "#39FF14"
  ui_error: "#FF3B7A"
  ui_warn: "#FDE047"
  prompt: "#E0F7FA"
  input_rule: "#FF2BD6"
  response_border: "#00F5FF"
  status_bar_bg: "#030308"
  status_bar_text: "#CBD5E1"
  status_bar_strong: "#5EEAD4"
  status_bar_dim: "#94A3B8"
  status_bar_good: "#4ADE80"
  status_bar_warn: "#FACC15"
  status_bar_bad: "#FB7185"
  status_bar_critical: "#F43F5E"
  session_label: "#FBBF24"
  session_border: "#94A3B8"
  selection_bg: "#2E1065"
  completion_menu_bg: "#05040A"
  completion_menu_current_bg: "#134E4A"
  completion_menu_meta_bg: "#05040A"
  completion_menu_meta_current_bg: "#115E59"
  shell_dollar: "#2DD4BF"
  voice_status_bg: "#0A0612"

spinner:
  waiting_faces:
    - "(⛓)"
    - "(◈)"
    - "(⌁)"
    - "(◢)"
    - "(⚔)"
    - "(✦)"
    - "(▣)"
  thinking_faces:
    - "(◈)"
    - "(⛓)"
    - "(⌁)"
    - "(◢◣)"
    - "(<>)"
    - "(╬)"
  thinking_verbs:
    - "jacking into the council"
    - "spawning parallel leaves"
    - "routing through Hermes mesh"
    - "synthesizing candidate evidence"
    - "forging merge topology"
    - "running blind critique"
    - "composing on Grok silicon"
    - "parsing swarm telemetry"
    - "locking fail-closed gates"
    - "diffing the winning path"
    - "warming the neon bus"
    - "handshaking leaf nodes"
  wings:
    - ["⟨◈", "◈⟩"]
    - ["⟨⛓", "⛓⟩"]
    - ["⟨⌁", "⌁⟩"]
    - ["⟪⚕", "⚕⟫"]
    - ["╠◢", "◣╣"]
    - ["▐✦", "✦▌"]
    - ["⟦◈", "◈⟧"]
    - ["╞⛓", "⛓╡"]

branding:
  agent_name: "Heavy Coder"
  welcome: "◈ IDE-safe composer (> prompt). Tip: install profile as --name hc --alias for shorter prefix. /skin heavy-coder for full neon."
  goodbye: "Link closed. Council adjourned. ◈ ⛓ ⚕"
  response_label: " ⟨◈ HEAVY⟩ "
  # Chain only: a second arrow (▸, ❯, …) often paints one cell into the composer
  # on Cursor/VS Code terminals, so it sits beside your first typed character.
  prompt_symbol: ">"
  help_header: "╭─ ⛓ HEAVY CODER · command deck ─╮"

tool_prefix: "▌"

tool_emojis:
  terminal: "⚔"
  delegate_task: "⛓"
  patch: "◈"
  read_file: "⌁"
  write_file: "✦"
  search_files: "◢"
  execute_code: "▣"
  todo: "╬"
  process: "◎"
  browser_navigate: "◉"
  skill_view: "⚕"

