spinner:
  waiting_faces:
    - "(⛓)"
    - "(◈)"
    - "(⌁)"
    - "(⚔)"
    - "(✦)"
  thinking_faces:
    - "(◈)"
    - "(⛓)"
    - "(⌁)"
    - "(<>)"
  thinking_verbs:
    - "spawning candidates"
    - "running the council"
    - "synthesizing evidence"
    - "delegating leaves"
    - "composing in parallel"
    - "forging a merge path"
    - "cross-checking Grok"
    - "routing through Hermes"
  wings:
    - ["⟪◈", "◈⟫"]
    - ["⟪⛓", "⛓⟫"]
    - ["⟪⚕", "⚕⟫"]
    - ["⟪✦", "✦⟫"]

branding:
  agent_name: "Heavy Coder"
  welcome: "Composer swarms on Hermes - type a task, /agents during batches, /help for commands. Powered by Hermes · Grok (xAI)."
  goodbye: "Council adjourned. ⚕ ◈"
  response_label: " ◈ Heavy "
  prompt_symbol: "⛓"
  help_header: "(⛓) Heavy Coder · Hermes commands"

tool_prefix: "╎"

tool_emojis:
  terminal: "⚔"
  delegate_task: "⛓"
  patch: "◈"
  read_file: "⌁"
  write_file: "✦"

