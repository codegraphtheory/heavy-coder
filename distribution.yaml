name: heavy-coder
version: 0.1.5
description: "Terminal-first Hermes profile distribution for adaptive Heavy-style coding-agent teams. Heavy team mode (width 3+ delegate_task, blind critic etc.) is DEFAULT and ENFORCED via SOUL.md, config.yaml, .hermes.md and heavy-team-default skill for all coding/repo tasks."
hermes_requires: ">=0.12.0"
author: "CodeGraphTheory"
license: "MIT"
env_requires:
  - name: GITHUB_TOKEN
    description: "Optional token for GitHub API access. Prefer gh auth for local terminal workflows."
    required: false
distribution_owned:
  - SOUL.md
  - config.yaml
  - mcp.json
  - skills
  - scripts
  - schemas
  - src
  - docs
  - examples
  - distribution.yaml
  - README.md
  - AGENTS.md
  - .env.EXAMPLE
  - .hermes.md
source: github.com/codegraphtheory/heavy-coder
