name: heavy-coder
version: 0.1.0
description: "Terminal-first Hermes profile distribution for adaptive Heavy-style coding-agent teams."
hermes_requires: ">=0.12.0"
author: "CodeGraphTheory"
license: "MIT"
env_requires:
  - name: GITHUB_TOKEN
    description: "Optional token for GitHub API access. Prefer gh auth for local terminal workflows."
    required: false
distribution_owned:
  - SOUL.md
  - config.yaml
  - mcp.json
  - skills/
  - scripts/
  - schemas/
  - src/
  - docs/
  - examples/
  - distribution.yaml
  - README.md
  - AGENTS.md
  - .env.EXAMPLE
