name: heavy-coder
version: 0.3.0
description: "Hermes profile with shell-hook enforced multi-candidate coding teams (Plan 1A)."
hermes_requires: ">=0.12.0"
author: "CodeGraphTheory"
license: "MIT"
template_source:
  name: codegraphtheory/hermes-profile-template
  url: https://github.com/codegraphtheory/hermes-profile-template
  relationship: built-from-template
env_requires:
  - name: GITHUB_TOKEN
    description: "Optional token for GitHub API access. Prefer gh auth for local terminal workflows."
    required: false
distribution_owned:
  - SOUL.md
  - config.yaml
  - mcp.json
  - skills
  - scripts
  - schemas
  - src
  - docs
  - examples
  - distribution.yaml
  - README.md
  - AGENTS.md
  - .env.EXAMPLE
  - .hermes.md
  - github-repo-metadata.yaml
  - agent-hooks
  - plugins
  - skins
source: github.com/codegraphtheory/heavy-coder