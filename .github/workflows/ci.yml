name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python -m pip install -e '.[dev]'
      - run: python scripts/validate_distribution.py .
      - run: python -m ruff check .
      - run: python -m mypy src tests
      - run: python -m pytest
