name: Validate distribution

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python -m pip install PyYAML
      - run: python scripts/validate_distribution.py .
      - run: python -m py_compile skills/heavy-issue-to-merge/scripts/*.py skills/heavy-coding-eval/scripts/*.py scripts/*.py
