name: Bug report
description: Report a problem with the Heavy Coder scaffold or future behavior.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Commands, output, screenshots, or logs. Do not include secrets.
